<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #ccc;
            text-align: center;
        }

        #visualization {
            background-color: black;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            max-width: 1000px;
        }

        svg {
            display: block;
        }

        .node {
            stroke: #fff;
            stroke-width: 1px;
            cursor: move;
        }

        .node:hover {
            stroke: #333;
            stroke-width: 3px;
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.6;
        }

        .link.dated {
            stroke: #3ce780;
            stroke-width: 2px;
        }

        .link.hooked-up {
            stroke: #ffff06;
            stroke-width: 2px;
        }

        .link.friends {
            stroke: #00d9ff;
            stroke-width: 2px;
        }

        .link.enemies {
            stroke: #ff0f0f;
            stroke-width: 3px;
        }

        .node-label {
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            text-anchor: middle;
        }

        .tooltip {
            position: absolute;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .legend {
            margin: 20px auto;
            max-width: 1000px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .legend-item {
            display: inline-block;
            margin-right: 30px;
            font-size: 14px;
        }

        .legend-line {
            display: inline-block;
            width: 30px;
            height: 2px;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <h1>Social Network Visualization</h1>

    <div class="legend">
            <div style="margin: 20px auto; max-width: 1000px; padding: 15px; background-color: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                <label for="node-filter-dropdown"><strong>Hide nodes:</strong></label>
                <select id="node-filter-dropdown" multiple size="6" style="width: 300px; margin-left: 10px;"></select>
                <span style="font-size:12px; color:#888; margin-left:10px;">(Hold Ctrl/Cmd to select multiple)</span>
            </div>
        Relationships:
        <div class="legend-item">
            <input type="checkbox" class="toggle-relationship" data-type="dated" checked style="margin-right:6px;">
            <span class="legend-line" style="background-color: #3ce780;"></span>
            <span>Dated</span>
        </div>
        <div class="legend-item">
            <input type="checkbox" class="toggle-relationship" data-type="enemies" checked style="margin-right:6px;">
            <span class="legend-line"
                style="background-color: #ff0f0f; background-image: repeating-linear-gradient(90deg, #ff0f0f 0px, #ff0f0f 5px, transparent 5px, transparent 10px);"></span>
            <span>Enemies</span>
        </div>
        <div class="legend-item">
            <input type="checkbox" class="toggle-relationship" data-type="hooked-up" checked style="margin-right:6px;">
            <span class="legend-line" style="background-color: #ffff06;"></span>
            <span>Hookup</span>
        </div>
    </div>

    <div id="visualization"></div>
    <div class="tooltip" id="tooltip"></div>

    <script src="social-analysis.js">
       

    </script>
</body>

</html>

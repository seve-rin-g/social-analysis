<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.cdnfonts.com/css/pp-pangaia" rel="stylesheet">
    <title>Social Network Visualization</title>
    <!-- Choices.js CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <!-- Choices.js JS -->
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: 'PP Pangaia', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #000;
        }

        h1 {
            font-family: 'PP Pangaia', sans-serif;
            color: #ccc;
            text-align: center;
            font-weight: 400;
            font-size: 4em;
        }

        #visualization {
            background-color: black;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 20px auto;
            max-width: 1000px;
        }

        svg {
            display: block;
        }

        .node {
            stroke: #fff;
            stroke-width: 1px;
            cursor: move;
            color: red;
        }

        .node:hover {
            stroke: #333;
            stroke-width: 3px;
        }

        .link {
            stroke: #999;
            stroke-opacity: 0.6;
        }

        .link.dated {
            stroke: #3ce780;
            stroke-width: 2px;
        }

        .link.hooked-up {
            stroke: rgb(185, 81, 255);
            stroke-width: 2px;
        }

        .link.friends {
            stroke: #00d9ff;
            stroke-width: 2px;
        }

        .link.enemies {
            stroke: #ff0f0f;
            stroke-width: 3px;
        }

        .node-label {
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            text-anchor: middle;
            color: #f00
        }

        .tooltip {
            position: absolute;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            border-radius: 5px;
            font-size: 1.4em;
            pointer-events: none;
            display: none;
            z-index: 10;
        }

        .legend {
            margin: 20px auto;
            max-width: 1000px;
            padding: 15px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .legend-item {
            display: inline-block;
            margin-right: 30px;
            font-size: 14px;
        }

        .legend-line {
            display: inline-block;
            width: 30px;
            height: 2px;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <h1>Social Network Visualization</h1>

    <div class="legend">
        Relationships:&nbsp;&nbsp;
        <div class="legend-item">
            <input type="checkbox" class="toggle-relationship" data-type="dated" checked style="margin-right:6px;">
            <span class="legend-line" style="background-color: #3ce780;"></span>
            <span>Dated</span>
        </div>
        <div class="legend-item">
            <input type="checkbox" class="toggle-relationship" data-type="enemies" checked style="margin-right:6px;">
            <span class="legend-line"
                style="background-color: #ff0f0f; background-image: repeating-linear-gradient(90deg, #ff0f0f 0px, #ff0f0f 5px, transparent 5px, transparent 10px);"></span>
            <span>Enemies</span>
        </div>
        <div class="legend-item">
            <input type="checkbox" class="toggle-relationship" data-type="hooked-up" checked style="margin-right:6px;">
            <span class="legend-line" style="background-color: rgb(185, 81, 255);"></span>
            <span>Situationship</span>
        </div>
        <div
            style="margin: 20px auto; max-width: 1000px; padding: 15px; background-color: white; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <label for="node-filter-dropdown"><strong>Hide names:</strong></label>
            <select id="node-filter-dropdown" class="form-select" multiple></select>
        </div>
    </div>

    <div id="visualization"></div>
    <div class="tooltip" id="tooltip"></div>

    <script src="social-analysis.js">
</script>    <script>
    // Choices.js initialization for node filter
    document.addEventListener('DOMContentLoaded', function() {
        const dropdown = document.getElementById('node-filter-dropdown');
        // Wait for dropdown to be populated by main script
        const observer = new MutationObserver(() => {
            if (dropdown.options.length > 0 && !dropdown.choicesInstance) {
                dropdown.choicesInstance = new Choices(dropdown, {
                    removeItemButton: true,
                    searchEnabled: true,
                    searchPlaceholderValue: 'Search nodes...',
                    placeholderValue: 'Select nodes to hide',
                    shouldSort: false
                });
            }
        });
        observer.observe(dropdown, {childList: true});
    });
    </script>
</body>

</html>
